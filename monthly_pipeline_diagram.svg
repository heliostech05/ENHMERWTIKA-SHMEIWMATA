<svg xmlns='http://www.w3.org/2000/svg' width='1800' height='1180' viewBox='0 0 1800 1180'>
  <defs>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .source { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 16; ry: 16; }
      .internal { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 16; ry: 16; }
      .output { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 16; ry: 16; }
      .txt { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtxt { font: 400 14px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id='arrowhead' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto'>
      <polygon points='0 0, 10 3.5, 0 7' fill='#475569' />
